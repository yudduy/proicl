name: polaris-vllm-hf-calibration-a100x1-hold
instance_type: a100-80gb.sxm.1x
region: us-central3-a
allocation_mode: spot
preemptible_ok: true
max_price_per_hour: 0.04
max_run_time_hours: 2
terminate_on_exit: true
upload_code: false
env:
  HF_HOME: /mnt/local/proicl-cache/huggingface
  HF_HUB_CACHE: /mnt/local/proicl-cache/huggingface/hub
  HUGGINGFACE_HUB_CACHE: /mnt/local/proicl-cache/huggingface/hub
  TRANSFORMERS_CACHE: /mnt/local/proicl-cache/huggingface/transformers
  XDG_CACHE_HOME: /mnt/local/proicl-cache/xdg
  PIP_CACHE_DIR: /mnt/local/proicl-cache/pip
  TORCH_HOME: /mnt/local/proicl-cache/torch
  CUDA_CACHE_PATH: /mnt/local/proicl-cache/cuda
  HF_HUB_ENABLE_HF_TRANSFER: "1"
  HF_HUB_DISABLE_XET: "1"
  TOKENIZERS_PARALLELISM: "false"
  PYTHONDONTWRITEBYTECODE: "1"
  VLLM_USE_V1: "0"
command: |
  bash -lc '
  set -euo pipefail
  mkdir -p "$HF_HUB_CACHE" "$TRANSFORMERS_CACHE" "$XDG_CACHE_HOME" "$PIP_CACHE_DIR" "$TORCH_HOME" "$CUDA_CACHE_PATH" /workspace/polaris
  echo "POLARIS_VLLM_HF_CALIBRATION_HOLD_READY $(date -u +%Y%m%dT%H%M%SZ)"
  sleep 7200
  '
