  mkdir -p "$HF_HUB_CACHE" "$TRANSFORMERS_CACHE" "$XDG_CACHE_HOME" "$PIP_CACHE_DIR" "$TORCH_HOME" "$CUDA_CACHE_PATH" /workspace/polaris
