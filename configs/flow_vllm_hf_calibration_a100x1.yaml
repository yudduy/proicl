name: polaris-vllm-hf-calibration-a100x1
instance_type: a100-80gb.sxm.1x
region: us-central3-a
allocation_mode: spot
preemptible_ok: true
max_price_per_hour: 0.04
max_run_time_hours: 2
terminate_on_exit: true
upload_code: false
image: vllm/vllm-openai:v0.9.2
env:
  HF_HOME: /mnt/local/proicl-cache/huggingface
  HF_HUB_CACHE: /mnt/local/proicl-cache/huggingface/hub
  HUGGINGFACE_HUB_CACHE: /mnt/local/proicl-cache/huggingface/hub
  TRANSFORMERS_CACHE: /mnt/local/proicl-cache/huggingface/transformers
  XDG_CACHE_HOME: /mnt/local/proicl-cache/xdg
