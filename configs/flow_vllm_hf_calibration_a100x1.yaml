  TORCH_HOME: /mnt/local/proicl-cache/torch
  CUDA_CACHE_PATH: /mnt/local/proicl-cache/cuda
  HF_HUB_ENABLE_HF_TRANSFER: "1"
  HF_HUB_DISABLE_XET: "1"
  TOKENIZERS_PARALLELISM: "false"
  PYTHONDONTWRITEBYTECODE: "1"
  VLLM_USE_V1: "0"
