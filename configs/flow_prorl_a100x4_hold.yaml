name: polaris-prorl-a100x4-live
instance_type: 4xa100
region: us-central3-a
allocation_mode: spot
preemptible_ok: true
max_price_per_hour: 0.10
max_run_time_hours: 72
terminate_on_exit: false
upload_code: false
env:
  HF_HOME: /workspace/.cache/huggingface
  HF_HUB_CACHE: /workspace/.cache/huggingface/hub
  POLARIS_RUN_ROOT: /workspace/polaris/runs/prorl_recovery
command: |
  bash -lc '
  set -euo pipefail
  r="${POLARIS_RUN_ROOT:-/workspace/polaris/runs/prorl_recovery}"
  h="${HF_HUB_CACHE:-/workspace/.cache/huggingface/hub}"
  o="${r}/flow_a100x4_live/$(date -u +%Y%m%dT%H%M%SZ)"
  mkdir -p "$o" "$h"
  nvidia-smi -L > "$o/nvidia-smi-L.txt"
  nvidia-smi --query-gpu=index,name,memory.total,driver_version --format=csv,noheader > "$o/nvidia-smi-query.csv"
  g="$(grep -c "^GPU " "$o/nvidia-smi-L.txt")"
  printf "{\"passed\":%s,\"expected_gpus\":4,\"observed_gpus\":%s}\n" "$([ "$g" = 4 ] && echo true || echo false)" "$g" > "$o/gpu_check.json"
  printf "{\"run_kind\":\"flow\",\"profile\":\"flow_a100_weekend\",\"purpose\":\"persistent 4x A100 live hold for POLARIS ProRL audit\",\"artifact_dir\":\"%s\",\"max_price_per_hour\":0.10,\"max_run_time_hours\":72}\n" "$o" > "$o/manifest.json"
  printf "# Flow A100x4 Live Hold\n\nThis job keeps the verified 4x A100 instance alive for follow-on POLARIS work. It does not run experiment phases by itself.\n" > "$o/audit.md"
  test "$g" = 4
  echo "POLARIS_FLOW_A100X4_LIVE_READY $o"
  sleep 259200
  '
