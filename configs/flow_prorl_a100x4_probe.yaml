name: polaris-prorl-a100x4-probe
instance_type: 4xa100
region: us-central3-a
allocation_mode: spot
preemptible_ok: true
max_price_per_hour: 0.10
max_run_time_hours: 2
terminate_on_exit: true
upload_code: false
env:
  HF_HOME: /workspace/.cache/huggingface
  HF_HUB_CACHE: /workspace/.cache/huggingface/hub
  POLARIS_RUN_ROOT: /workspace/polaris/runs/prorl_recovery
command: |
  bash -lc '
  set -euo pipefail
  r="${POLARIS_RUN_ROOT:-/workspace/polaris/runs/prorl_recovery}"
  h="${HF_HUB_CACHE:-/workspace/.cache/huggingface/hub}"
  STAMP="$(date -u +%Y%m%dT%H%M%SZ)"
  o="${r}/flow_a100x4_probe/${STAMP}"
  mkdir -p "$o" "$h"
  nvidia-smi -L > "$o/nvidia-smi-L.txt"
  nvidia-smi --query-gpu=index,name,memory.total,driver_version --format=csv,noheader > "$o/nvidia-smi-query.csv"
  g="$(grep -c "^GPU " "$o/nvidia-smi-L.txt")"
  printf "{\"passed\":%s,\"expected_gpus\":4,\"observed_gpus\":%s}\n" "$([ "$g" = 4 ] && echo true || echo false)" "$g" > "$o/gpu_check.json"
  printf "{\"hf_hub_cache\":\"%s\",\"polaris_run_root\":\"%s\",\"secret_env_present\":{\"HF_TOKEN\":%s,\"HUGGINGFACE_HUB_TOKEN\":%s,\"XAI_API_KEY\":%s}}\n" "$h" "$r" "$([ -n "${HF_TOKEN:-}" ] && echo true || echo false)" "$([ -n "${HUGGINGFACE_HUB_TOKEN:-}" ] && echo true || echo false)" "$([ -n "${XAI_API_KEY:-}" ] && echo true || echo false)" > "$o/environment.json"
  printf "{\"imports\":\"not_checked_in_minimal_probe\"}\n" > "$o/preflight_imports.json"
  printf "{\"run_kind\":\"flow\",\"profile\":\"flow_a100_weekend\",\"purpose\":\"4x A100 provisioning probe only\",\"artifact_contract\":[\"environment.json\",\"preflight_imports.json\",\"gpu_check.json\",\"manifest.json\",\"audit.md\"]}\n" > "$o/manifest.json"
  printf "# Flow A100x4 Probe Audit\n\nFour-GPU visibility probe only; no experiment phase is run.\n" > "$o/audit.md"
  test "$g" = 4
  echo "POLARIS_FLOW_A100X4_PROBE_OK $o"
  '
