name: proicl-a100x8-signal
instance_type: a100-80gb.sxm.8x
region: us-central3-a
allocation_mode: spot
preemptible_ok: true
max_price_per_hour: 0.25
max_run_time_hours: 16
terminate_on_exit: false
upload_code: true
env:
  HF_HOME: /mnt/local/proicl-cache/huggingface
  HF_HUB_CACHE: /mnt/local/proicl-cache/huggingface/hub
  HUGGINGFACE_HUB_CACHE: /mnt/local/proicl-cache/huggingface/hub
  TRANSFORMERS_CACHE: /mnt/local/proicl-cache/huggingface/transformers
  XDG_CACHE_HOME: /mnt/local/proicl-cache/xdg
  PIP_CACHE_DIR: /mnt/local/proicl-cache/pip
  TORCH_HOME: /mnt/local/proicl-cache/torch
  CUDA_CACHE_PATH: /mnt/local/proicl-cache/cuda
  TOKENIZERS_PARALLELISM: "false"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
command: |
  bash -lc '
  set -euo pipefail
  REPO="$PWD"
  cd "$REPO"
  python3 -m venv /mnt/local/venvs/proicl
  source /mnt/local/venvs/proicl/bin/activate
  python -m pip install --upgrade pip
  python -m pip install -e ".[gepa_reflection]" reasoning-gym
  RUN_ROOT="${POLARIS_RUN_ROOT:-$REPO/runs}"
  mkdir -p "$RUN_ROOT"
  python scripts/run_proicl_signal.py \
    --root "$RUN_ROOT/proicl_overnight_signal" \
    --tracks reasoning_gym_boxnet reasoning_gym_graph_color reasoning_gym_family_relationships \
    --eval-split 20 40 \
    --gepa-dev-split 0 6 \
    --rollout-budget 8 \
    --archive-size 8 \
    --max-metric-calls 64 \
    --max-new-tokens 512 \
    --num-shards 8 \
    --memory-num-shards 1 \
    --gpus 0 1 2 3 4 5 6 7 \
    --backend hf \
    --run-kind flow \
    --run-stage small_real_slice \
    --cost-cap-dollars 4 \
    --estimated-dollar-cost-per-cell 0.25 \
    --estimated-wall-clock-seconds-per-cell 7200 \
    --xai-reflection-cap-dollars 2
  '
