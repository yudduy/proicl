name: proicl-a100x2-signal-live
instance_type: a100-80gb.sxm.2x
region: us-central3-a
allocation_mode: spot
preemptible_ok: true
max_price_per_hour: 0.07
max_run_time_hours: 24
terminate_on_exit: false
upload_code: false
env:
  HF_HOME: /mnt/local/proicl-cache/huggingface
  HF_HUB_CACHE: /mnt/local/proicl-cache/huggingface/hub
  HUGGINGFACE_HUB_CACHE: /mnt/local/proicl-cache/huggingface/hub
  TRANSFORMERS_CACHE: /mnt/local/proicl-cache/huggingface/transformers
  XDG_CACHE_HOME: /mnt/local/proicl-cache/xdg
  PIP_CACHE_DIR: /mnt/local/proicl-cache/pip
  TORCH_HOME: /mnt/local/proicl-cache/torch
  CUDA_CACHE_PATH: /mnt/local/proicl-cache/cuda
command: |
  bash -lc '
  set -euo pipefail
  mkdir -p /workspace/polaris "$HF_HUB_CACHE" "$TRANSFORMERS_CACHE" "$XDG_CACHE_HOME" "$PIP_CACHE_DIR" "$TORCH_HOME" "$CUDA_CACHE_PATH"
  o="/workspace/polaris/runs/proicl_overnight_signal_hold/$(date -u +%Y%m%dT%H%M%SZ)"
  mkdir -p "$o"
  nvidia-smi -L > "$o/nvidia-smi-L.txt"
  nvidia-smi --query-gpu=index,name,memory.total,driver_version --format=csv,noheader > "$o/nvidia-smi-query.csv"
  g="$(grep -c "^GPU " "$o/nvidia-smi-L.txt")"
  printf "{\"passed\":%s,\"expected_gpus\":2,\"observed_gpus\":%s}\n" "$([ "$g" = 2 ] && echo true || echo false)" "$g" > "$o/gpu_check.json"
  echo "PROICL_A100X2_HOLD_READY $o"
  sleep 86400
  '
