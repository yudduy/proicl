experiment: sps_recovery
phase: prompt_archive_build
frozen_policy_model: deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B
reflection_model: Qwen/Qwen2.5-7B-Instruct
archive_scope: cross_family_curriculum
train_tracks:
  - reasoning_gym_family_relationships
  - reasoning_gym_graph_color_n10
  - reasoning_gym_maze
  - reasoning_gym_palindrome_generation
  - reasoning_gym_letter_counting
heldout_tracks:
  - reasoning_gym_boxnet
  - reasoning_gym_acre
  - reasoning_gym_game_of_life_halting
  - reasoning_gym_graph_color_n12
dev_split: [0, 50]
archive_size: 8
max_metric_calls: 1500
gepa:
  minibatch_size: 3
  pareto_frontier: shared_across_tasks
  selection: pareto_candidate_sampling
  stopping: validation_plateau_3_or_budget
leakage_policy:
  no_eval_indices_in_archive_train: true
  no_prorl_traces: true
  no_brorl_traces: true
