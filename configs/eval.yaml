experiment: heldout_reasoning
phase: heldout_eval
frozen_policy_model: deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B
rl_reference_model: nvidia/Nemotron-Research-Reasoning-Qwen-1.5B
rl_reference_revision: main
tracks:
  - reasoning_gym_boxnet
  - reasoning_gym_acre
  - reasoning_gym_game_of_life_halting
  - reasoning_gym_graph_color_n12
conditions:
  - base_greedy
  - sps_only
  - gepa_sps_fixed
  - prorl_v2_greedy
eval_split: [20, 70]
n_per_task: 50
rollout_budget: 8
num_shards: auto_gpu_count
sampling:
  implementation: scalable_power_sampling
  paper_contract:
    target_distribution: p_alpha
    approximation: scaled_low_temperature_with_future_lookahead
    verifier_free_sampling: true
    verifier_use: final_scoring_and_selection_only
    jackknife_correction: true
  alpha: 4
  top_k: 8
  candidate_pool_size: 8
  rollouts_per_candidate: 8
  rollout_horizon: 128
  target_block_size: 192
  max_new_tokens_reasoning_gym: 1024
calibration:
  hf_vllm_scorer_parity: required
  sps_vs_mcmc_math500:
    enabled: true
    split: [0, 20]
    tolerance_abs_accuracy: 0.02
outputs:
  bundle: runs/experiment/<run-id>/results_bundle.tar.gz
  include_candidates_by_default: false
